# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

## remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix M-f
bind-key M-f send-prefix
#
## split panes using | and -
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# switch panes using Alt-arrow without prefix
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'

# statusbar
# set -g status-position bottom
# set -g status-justify left
set -g status-style 'fg=red'

set -g status-left ''
# set -g status-left-length 10

set -g status-right-style 'fg=black bg=yellow'
set -g status-right ''
# set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=red'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# messages
set -g message-style 'fg=yellow bg=red bold'

# Base window and pane index to 1
set -g base-index 1
setw -g pane-base-index 1


set -g focus-events on
set -g status-style bg=default
set -g status-left-length 99
set -g status-right-length 99
set -g status-justify centre

bind-key -n M-S-Left run-shell 'target=$((#{window_index}-1)); tmux swap-window -d -t "$target" 2>/dev/null || tmux move-window -t "$target"'
bind-key -n M-S-Right run-shell 'target=$((#{window_index}+1)); tmux swap-window -d -t "$target" 2>/dev/null || tmux move-window -t "$target"'
